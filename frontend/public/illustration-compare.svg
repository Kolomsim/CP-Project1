<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 320" fill="none">
  <!-- Фон -->
  <rect width="380" height="320" rx="16" fill="#fef9ef"/>
  <!-- Дом 1 (слева) -->
  <rect x="50" y="120" width="100" height="90" rx="4" fill="#f0d9a0" stroke="#d4a843" stroke-width="2"/>
  <rect x="70" y="145" width="25" height="35" rx="2" fill="#e8c880"/>
  <polygon points="45,125 100,75 155,125" fill="#d4a843" stroke="#b8922e" stroke-width="2"/>
  <!-- Дом 2 (справа) -->
  <rect x="230" y="120" width="100" height="90" rx="4" fill="#f0d9a0" stroke="#d4a843" stroke-width="2"/>
  <rect x="255" y="145" width="25" height="35" rx="2" fill="#e8c880"/>
  <polygon points="225,125 280,75 335,125" fill="#d4a843" stroke="#b8922e" stroke-width="2"/>
  <!-- Стрелка сравнения -->
  <line x1="160" y1="165" x2="220" y2="165" stroke="#d4a843" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="220,158 230,165 220,172" fill="#d4a843"/>
  <polygon points="160,158 150,165 160,172" fill="#d4a843"/>
  <!-- Сердечко (избранное) -->
  <path d="M190 230 C190 230 175 215 165 215 C150 215 145 228 145 238 C145 255 165 270 190 280 C215 270 235 255 235 238 C235 228 230 215 215 215 C205 215 190 230 190 230Z" fill="#e85c5c" opacity="0.8"/>
  <!-- Плюсик -->
  <circle cx="310" cy="240" r="16" fill="#d4a843"/>
  <line x1="310" y1="232" x2="310" y2="248" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="302" y1="240" x2="318" y2="240" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Текст -->
  <text x="190" y="300" font-size="12" fill="#b8922e" text-anchor="middle" font-family="Manrope, sans-serif">Сравните объекты</text>
</svg>