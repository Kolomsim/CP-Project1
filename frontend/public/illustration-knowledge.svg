<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 320" fill="none">
  <!-- Фон -->
  <rect width="380" height="320" rx="16" fill="#f5f0ff"/>
  <!-- Книга -->
  <rect x="100" y="100" width="180" height="140" rx="6" fill="#e0d6f5" stroke="#8b6fd6" stroke-width="2"/>
  <line x1="190" y1="100" x2="190" y2="240" stroke="#8b6fd6" stroke-width="1.5"/>
  <!-- Страницы -->
  <rect x="110" y="115" width="72" height="8" rx="2" fill="#c4b5e8"/>
  <rect x="110" y="130" width="60" height="8" rx="2" fill="#c4b5e8"/>
  <rect x="110" y="145" width="68" height="8" rx="2" fill="#c4b5e8"/>
  <rect x="110" y="160" width="55" height="8" rx="2" fill="#c4b5e8"/>
  <rect x="110" y="175" width="65" height="8" rx="2" fill="#c4b5e8"/>
  <rect x="110" y="190" width="58" height="8" rx="2" fill="#c4b5e8"/>
  <rect x="200" y="115" width="65" height="8" rx="2" fill="#c4b5e8"/>
  <rect x="200" y="130" width="55" height="8" rx="2" fill="#c4b5e8"/>
  <rect x="200" y="145" width="70" height="8" rx="2" fill="#c4b5e8"/>
  <rect x="200" y="160" width="60" height="8" rx="2" fill="#c4b5e8"/>
  <!-- Лупа поверх книги -->
  <circle cx="300" cy="110" r="22" fill="none" stroke="#8b6fd6" stroke-width="2.5"/>
  <line x1="316" y1="126" x2="330" y2="140" stroke="#8b6fd6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Бейджики -->
  <rect x="60" y="80" width="70" height="24" rx="12" fill="#8b6fd6"/>
  <text x="95" y="96" font-size="10" fill="#fff" text-anchor="middle" font-family="Manrope, sans-serif">Статьи</text>
  <rect x="250" y="80" width="80" height="24" rx="12" fill="#b096e0"/>
  <text x="290" y="96" font-size="10" fill="#fff" text-anchor="middle" font-family="Manrope, sans-serif">Инструкции</text>
  <!-- Закладка -->
  <polygon points="280,210 280,240 295,228 310,240 310,210" fill="#8b6fd6" opacity="0.7"/>
  <!-- Текст внизу -->
  <text x="190" y="280" font-size="11" fill="#6b52b0" text-anchor="middle" font-family="Manrope, sans-serif">Юридические знания — просто и понятно</text>
</svg>