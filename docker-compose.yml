services:
  postgres:
    image: postgres:16-alpine
    container_name: cp-postgres
    environment:
      POSTGRES_DB: smartcheck
      POSTGRES_USER: smartcheck
      POSTGRES_PASSWORD: smartcheck_secret
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - cp-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smartcheck -d smartcheck']
      interval: 5s
      timeout: 5s
      retries: 5
    
  redis:
    image: redis:7-alpine
    container_name: smartcheck-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - cp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cp-backend
    ports:
      - '8000:8000'
    environment:
      - APP_NAME=SmartCheck Недвижимость
      - APP_VERSION=1.0.0
      - CORS_ORIGINS=http://localhost:3000
      - DEBUG=True
      - HOST=0.0.0.0
      - PORT=8000
      - RELOAD=False
      - DATABASE_URL=postgresql+asyncpg://smartcheck:smartcheck_secret@postgres:5432/smartcheck
      - JWT_SECRET_KEY=smartcheck-jwt-secret-key-change-in-production-2026
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cp-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cp-network

networks:
  cp-network:
    driver: bridge

volumes:
  pgdata:
  redis_data:
